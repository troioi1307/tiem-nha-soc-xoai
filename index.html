<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Nhà Xoài Sóc - Senior UI/UX</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --mango: #FFD700; --leaf: #7DBE31; --cream: #FFFDF5;
            --brown: #5D4037; --pink: #FF8DA1; --white: #FFFFFF;
        }

        [data-theme="dark"] {
            --mango: #FFB300; --leaf: #9CCC65; --cream: #1A1A1A;
            --brown: #FFF9E3; --pink: #FF80AB; --white: #2D2D2D;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Quicksand', sans-serif; background: var(--cream); color: var(--brown); transition: 0.4s; overflow-x: hidden; }

        /* --- HEADER --- */
        header {
            background: linear-gradient(180deg, var(--mango) 0%, var(--cream) 100%);
            padding: 60px 20px 40px; text-align: center; border-bottom-left-radius: 60px; border-bottom-right-radius: 60px; position: relative;
        }
        .theme-toggle { position: absolute; top: 20px; right: 20px; background: var(--white); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; color: var(--mango); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .main-logo { font-size: 100px; display: inline-block; animation: bounceIn 1.2s; }
        .shop-name { font-family: 'Comfortaa', cursive; font-size: 2.2rem; color: #D84315; margin: 10px 0; }
        .qr-card { background: white; padding: 10px; border-radius: 15px; display: inline-block; margin-top: 15px; border: 2px dashed var(--mango); }

        /* --- STICKY NAV --- */
        nav {
            position: sticky; top: 0; z-index: 1000; background: var(--white); opacity: 0.95; backdrop-filter: blur(10px);
            padding: 15px 0; display: flex; gap: 12px; overflow-x: auto; padding-left: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }
        .nav-item { padding: 10px 20px; background: #eee; border-radius: 25px; text-decoration: none; color: #5D4037; font-weight: 700; white-space: nowrap; transition: 0.3s; }
        .nav-item.active { background: var(--mango); transform: scale(1.05); }

        /* --- MENU --- */
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .category-title { margin: 35px 0 15px; font-family: 'Comfortaa'; color: var(--leaf); border-left: 6px solid var(--mango); padding-left: 12px; }
        .menu-card { background: var(--white); border-radius: 25px; padding: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 18px; box-shadow: 0 8px 25px rgba(0,0,0,0.04); }
        .menu-icon { font-size: 40px; background: var(--cream); width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; border-radius: 20px; }
        .btn-add { background: var(--leaf); color: white; border: none; padding: 8px 18px; border-radius: 14px; font-weight: 700; cursor: pointer; }

        /* --- GỘP NÚT CART - CHUYÊN NGHIỆP --- */
        .cart-float {
            position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px; background: var(--pink); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; z-index: 1001; box-shadow: 0 10px 25px rgba(255, 141, 161, 0.5);
        }

        .cart-panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top-left-radius: 40px; border-top-right-radius: 40px;
            padding: 30px 20px; z-index: 1002; display: none; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); animation: slideUp 0.4s ease-out;
        }

        /* Nút gộp tối ưu */
        .btn-send-all {
            width: 100%; height: 60px; background: #0084FF; color: white; border: none; border-radius: 20px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(0, 132, 255, 0.3); transition: 0.3s; margin-top: 25px;
        }
        .btn-send-all:active { transform: scale(0.95); background: #0073e6; }

        footer { background: #333; color: white; padding: 60px 20px 110px; text-align: center; border-top-left-radius: 50px; border-top-right-radius: 50px; }
    </style>
</head>
<body data-theme="light">

    <header>
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
        <div class="main-logo">🐿️🥭</div>
        <h1 class="shop-name">TIỆM NHÀ XOÀI SÓC</h1>
        <div class="qr-card">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://m.me/luong.kute.568" width="100">
            <p style="font-size: 10px; font-weight: bold; margin-top: 5px; color: #555;">QUÉT ĐẶT MÓN</p>
        </div>
        <div style="display: flex; justify-content: center; gap: 15px; margin-top: 25px;">
            <a href="https://google.com/maps/place/Báng+Tráng+Xoài+Sóc/@20.0987887,106.2812127,15z/data=!4m6!3m5!1s0x313611002e13c06f:0x3398d382bbfdda07!8m2!3d20.0961835!4d106.2745724!16s%2Fg%2F11xyp5qt7f" target="_blank" class="btn-add" style="background:white; color:#5D4037;"><i class="fa-solid fa-location-dot"></i> Maps</a>
            <a href="tel:0985142598" class="btn-add" style="background:white; color:#5D4037;"><i class="fa-solid fa-phone"></i> Gọi Ngay</a>
        </div>
    </header>

    <nav id="navbar">
        <a href="#tra-sua" class="nav-item active">🧋 Trà Sữa</a>
        <a href="#sua-chua" class="nav-item">🍦 Sữa Chua</a>
        <a href="#tra" class="nav-item">🍑 Trà</a>
        <a href="#latte" class="nav-item">🥛 Latte</a>
        <a href="#soda" class="nav-item">🍹 Soda</a>
    </nav>

    <div class="container" id="menu-content"></div>

    <footer>
        <h3 style="font-family: 'Comfortaa'; margin-bottom: 15px;">Tiệm Nhà Xoài Sóc 🐿️</h3>
        <p>Hotline: 0985142598</p>
        <p style="margin-top: 25px; opacity: 0.5; font-size: 0.8rem;">Cảm ơn bạn đã ủng hộ tiệm! ✨</p>
    </footer>

    <div class="cart-float" onclick="toggleCart()">
        <i class="fa-solid fa-basket-shopping"></i>
        <span id="cart-count" style="position: absolute; top: 0; right: 0; background: #FF3D00; font-size: 12px; padding: 4px 8px; border-radius: 50%;">0</span>
    </div>

    <div class="cart-panel" id="cart-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="font-family:'Comfortaa'">Đơn hàng của bạn 📋</h3>
            <i class="fa-solid fa-xmark" onclick="toggleCart()" style="font-size:28px; cursor:pointer;"></i>
        </div>
        <div id="cart-items-list" style="max-height: 250px; overflow-y: auto;"></div>
        <div style="margin-top: 20px; display:flex; justify-content:space-between; font-weight:800; border-top: 2px dashed #eee; padding-top: 15px; font-size: 1.2rem;">
            <span>Tổng cộng:</span>
            <span id="cart-total" style="color:var(--pink)">0đ</span>
        </div>
        
        <button class="btn-send-all" onclick="handleOrder()">
            <i class="fa-brands fa-facebook-messenger"></i>
            GỬI ĐƠN QUA MESSENGER
        </button>
        <p style="text-align: center; font-size: 0.8rem; margin-top: 10px; color: #888;">(Tự động copy đơn hàng khi bấm)</p>
    </div>

    <script>
        const menuData = {
            "tra-sua": { title: "Trà Sữa 🧋", items: [
                { name: "Trà sữa gạo rang", price: [20, 25], icon: "🌾" },
                { name: "Trà sữa hạt dẻ cười", price: [20, 25], icon: "🥜" },
                { name: "Trà sữa thái xanh", price: [20, 25], icon: "🍵" },
                { name: "Trà sữa truyền thống full topping", price: [20, 25], icon: "🧋" },
                { name: "Trà sữa sầu riêng", price: [20, 25], icon: "🍈" }
            ]},
            "sua-chua": { title: "Sữa Chua 🍦", items: [
                { name: "Sữa chua việt quất", price: 25, icon: "🫐" }, { name: "Sữa chua dâu", price: 25, icon: "🍓" },
                { name: "Sữa chua chanh dây", price: 25, icon: "🍋" }, { name: "Sữa chua xoài", price: 25, icon: "🥭" },
                { name: "Sữa chua dưa lưới", price: 25, icon: "🍈" }, { name: "Sữa chua đào", price: 25, icon: "🍑" }
            ]},
            "tra": { title: "Trà Trái Cây 🍑", items: [{ name: "Trà thạch đào", price: 20, icon: "🍑" }]},
            "latte": { title: "Latte / Sữa 🥛", items: [
                { name: "Choco sữa chuối", price: 25, icon: "🍌" }, { name: "Matcha latte", price: 20, icon: "🍵" },
                { name: "Matcha kem muối", price: 25, icon: "🧂" }, { name: "Cacao latte", price: 20, icon: "🍫" },
                { name: "Cacao kem muối", price: 25, icon: "🧂" }, { name: "Cacao bạc hà", price: 20, icon: "🌿" },
                { name: "Milo dầm", price: 20, icon: "🥣" }
            ]},
            "soda": { title: "Soda Fresh 🍹", items: [
                { name: "Soda việt quất", price: 15, icon: "🫐" }, { name: "Soda chanh dây", price: 15, icon: "🍋" },
                { name: "Soda dâu", price: 15, icon: "🍓" }, { name: "Soda dưa lưới", price: 15, icon: "🍈" }
            ]}
        };

        function renderMenu() {
            const container = document.getElementById('menu-content');
            for (let key in menuData) {
                let section = `<h2 id="${key}" class="category-title">${menuData[key].title}</h2>`;
                menuData[key].items.forEach(item => {
                    let prices = Array.isArray(item.price) 
                        ? `<div style="display:flex; gap:10px; margin-top:10px">
                             <button onclick="addToCart('${item.name} (N)', 20000)" class="btn-add" style="background:var(--white); color:var(--leaf); border:1px solid var(--leaf)">20k</button>
                             <button onclick="addToCart('${item.name} (L)', 25000)" class="btn-add" style="background:var(--white); color:var(--leaf); border:1px solid var(--leaf)">25k</button>
                           </div>`
                        : `<div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; width:100%">
                             <span style="color:var(--pink); font-weight:800">${item.price}k</span>
                             <button onclick="addToCart('${item.name}', ${item.price*1000})" class="btn-add">Thêm</button>
                           </div>`;
                    section += `<div class="menu-card animate__animated animate__fadeInUp"><div class="menu-icon">${item.icon}</div><div style="flex:1"><p style="font-weight:700">${item.name}</p>${prices}</div></div>`;
                });
                container.innerHTML += section;
            }
        }

        let cart = [];
        function addToCart(name, price) {
            const ex = cart.find(i => i.name === name);
            if (ex) ex.qty++; else cart.push({ name, price, qty: 1 });
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = ""; let total = 0, count = 0;
            cart.forEach((item, index) => {
                total += item.price * item.qty; count += item.qty;
                list.innerHTML += `<div style="display:flex;justify-content:space-between;margin-bottom:15px;align-items:center"><div><b>${item.name}</b><br><small>${item.price.toLocaleString()}đ x ${item.qty}</small></div><div style="display:flex;align-items:center;gap:10px"><button onclick="changeQty(${index},-1)" class="btn-add" style="padding:2px 8px">-</button><span>${item.qty}</span><button onclick="changeQty(${index},1)" class="btn-add" style="padding:2px 8px">+</button></div></div>`;
            });
            document.getElementById('cart-total').innerText = total.toLocaleString() + "đ";
            document.getElementById('cart-count').innerText = count;
        }

        function changeQty(index, d) { cart[index].qty += d; if (cart[index].qty <= 0) cart.splice(index, 1); updateCart(); }
        function toggleCart() { const p = document.getElementById('cart-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

        // HÀM XỬ LÝ CHÍNH: COPY + MỞ LINK
        function handleOrder() {
            if (cart.length === 0) return alert("Giỏ hàng đang trống!");
            
            // 1. Tạo nội dung đơn
            let text = "ĐƠN TIỆM NHÀ XOÀI SÓC 🐿️\n---\n";
            cart.forEach(i => text += `• ${i.name} x${i.qty}\n`);
            text += `---\nTỔNG: ${document.getElementById('cart-total').innerText}`;

            // 2. Thực hiện copy
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            // 3. Mở Messenger
            window.location.href = "https://m.me/luong.kute.568";
        }

        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }

        window.addEventListener('scroll', () => {
            let cur = "";
            document.querySelectorAll('h2').forEach(s => { if (pageYOffset >= s.offsetTop - 150) cur = s.getAttribute('id'); });
            document.querySelectorAll('.nav-item').forEach(i => {
                i.classList.remove('active');
                if (i.getAttribute('href') === `#${cur}`) i.classList.add('active');
            });
        });

        renderMenu();
    </script>
</body>
</html>
