<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiệm Nhà Sóc Xoài - Thực Đơn Full</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF8C00; --secondary: #FFA500; --dark: #332115; --bg: #FFF9F2; --white: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--dark); padding-bottom: 100px; }
        
        /* Header */
        header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; text-align: center; padding: 25px 15px; border-radius: 0 0 20px 20px; }
        .brand-title { font-size: 24px; font-weight: 700; }
        .slogan { font-size: 13px; opacity: 0.9; margin: 5px 0 15px; }
        .quick-actions { display: flex; justify-content: center; gap: 8px; }
        .btn-action { padding: 6px 12px; border-radius: 20px; text-decoration: none; color: white; font-size: 11px; background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.2); }

        /* Navigation */
        nav { position: sticky; top: 0; background: white; z-index: 100; display: flex; overflow-x: auto; padding: 12px 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        nav a { padding: 5px 15px; text-decoration: none; color: var(--dark); font-weight: 700; font-size: 13px; white-space: nowrap; }

        /* Menu Grid */
        .container { padding: 15px; }
        .section-title { margin: 25px 0 12px; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: #ddd; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 12px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); display: flex; flex-direction: column; position: relative; }
        .item-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; height: 38px; overflow: hidden; }
        .item-price { color: var(--primary); font-weight: 700; font-size: 14px; margin-bottom: 10px; }
        .add-btn { background: var(--dark); color: white; border: none; width: 100%; padding: 8px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* Badges */
        .badge { position: absolute; top: -5px; right: -5px; background: #FF4757; color: white; font-size: 9px; padding: 2px 6px; border-radius: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Option Picker Modal */
        .picker-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .picker-content { background: white; width: 100%; max-width: 300px; padding: 20px; border-radius: 20px; text-align: center; }
        .price-option { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; background: none; font-weight: 600; cursor: pointer; }
        .price-option:active { background: #f0f0f0; }

        /* Cart & Checkout */
        .cart-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; background: var(--dark); color: white; padding: 15px 20px; border-radius: 15px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 999; }
        .checkout-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: flex-end; }
        .modal-body { background: white; width: 100%; border-radius: 20px 20px 0 0; padding: 20px; max-height: 85vh; overflow-y: auto; }
        .order-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .ship-box { background: #fdf2e9; padding: 12px; border-radius: 12px; margin: 15px 0; font-size: 13px; }
        .btn-zalo { background: #25D366; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 700; font-size: 16px; }
    </style>
</head>
<body>

    <header>
        <div class="brand-title">Tiệm Nhà Sóc Xoài</div>
        <p class="slogan">Ăn vặt ngon - Ship tận nơi - Hải Xuân</p>
        <div class="quick-actions">
            <a href="https://facebook.com" class="btn-action">Facebook</a>
            <a href="https://zalo.me/0985142598" class="btn-action">Nhắn Zalo</a>
            <a href="http://googleusercontent.com/maps.google.com/7" class="btn-action">Chỉ đường</a>
        </div>
    </header>

    <nav>
        <a href="#an-vat">🥢 Ăn Vặt</a>
        <a href="#tra-sua">🧋 Trà Sữa</a>
        <a href="#sua-chua">🍦 Sữa Chua</a>
        <a href="#giai-khat">🍹 Giải Khát</a>
    </nav>

    <div class="container">
        <h2 class="section-title" id="an-vat">🥢 Ăn Vặt</h2>
        <div class="menu-grid" id="grid-anvat"></div>

        <h2 class="section-title" id="tra-sua">🧋 Trà Sữa & Milo</h2>
        <div class="menu-grid" id="grid-trasua"></div>

        <h2 class="section-title" id="sua-chua">🍦 Sữa Chua Trái Cây</h2>
        <div class="menu-grid" id="grid-suachua"></div>

        <h2 class="section-title" id="giai-khat">🍹 Giải Khát</h2>
        <div class="menu-grid" id="grid-giaikhat"></div>
    </div>

    <div id="pickerModal" class="picker-modal">
        <div class="picker-content">
            <h4 id="pickerTitle" style="margin-bottom:15px">Chọn mức giá</h4>
            <div id="pickerOptions"></div>
            <button onclick="closePicker()" style="margin-top:10px; border:none; background:none; color:#999">Đóng</button>
        </div>
    </div>

    <div id="cartBar" class="cart-bar">
        <div><span id="cartCount">0</span> món | <strong id="cartTotal">0đ</strong></div>
        <button onclick="openCheckout()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:10px; font-weight:700">Xác nhận</button>
    </div>

    <div id="checkoutModal" class="checkout-modal">
        <div class="modal-body">
            <h3 style="text-align:center; margin-bottom:15px">🛒 Đơn hàng của bạn</h3>
            <div id="orderItems" style="border-top:1px dashed #ddd; padding-top:15px"></div>
            <div class="ship-box" id="shipCalc">Đang tính phí ship...</div>
            <button class="btn-zalo" onclick="sendToZalo()">🚀 GỬI ĐƠN QUA ZALO</button>
            <button onclick="closeCheckout()" style="width:100%; border:none; background:none; padding:15px; color:#999">Quay lại</button>
        </div>
    </div>

    <script>
        const MENU = {
            anvat: [
                { n: "Bánh tráng trộn", p: [15000, 20000], h: true },
                { n: "Bánh tráng cuộn", p: [20000, 25000] },
                { n: "Bánh mì nướng muối ớt", p: [15000, 20000, 25000], h: true },
                { n: "Bò viên", p: 20000 },
                { n: "Tôm viên", p: 20000 },
                { n: "Cá viên", p: 20000 },
                { n: "Lạp xưởng", p: 15000 },
                { n: "Xúc xích", p: 10000 },
                { n: "Trà tắc", p: 10000 },
                { n: "Nước cam", p: 10000 }
            ],
            trasua: [
                { n: "Milo dầm", p: 20000, h: true },
                { n: "Trà sữa truyền thống Full", p: 25000, h: true },
                { n: "Trà sữa gạo rang", p: 25000 },
                { n: "Trà sữa hạt dẻ", p: 25000 },
                { n: "Trà sữa phô mai", p: 25000 },
                { n: "Matcha latte kem", p: [25000, 30000] },
                { n: "Cacao latte", p: [20000, 25000] }
            ],
            suachua: [
                { n: "Sữa chua Việt quất", p: 25000 },
                { n: "Sữa chua Dâu", p: 25000 },
                { n: "Sữa chua Chanh dây", p: 25000 },
                { n: "Sữa chua Dưa lưới", p: 25000 },
                { n: "Sữa chua Đào", p: 25000 }
            ],
            giaikhat: [
                { n: "Soda Dâu", p: 15000 },
                { n: "Soda Chanh dây", p: 15000 },
                { n: "Soda Dưa lưới", p: 15000 },
                { n: "Soda Việt quất", p: 15000 }
            ]
        };

        const SHOP_POS = { lat: 20.0961835, lng: 106.2745724 };
        let cart = [];
        let shipData = { dist: 0, fee: 0, lat: 0, lng: 0 };

        function render() {
            for (let cat in MENU) {
                document.getElementById(`grid-${cat}`).innerHTML = MENU[cat].map(item => {
                    const priceDisplay = Array.isArray(item.p) ? `${item.p[0].toLocaleString()}đ - ${item.p[item.p.length-1].toLocaleString()}đ` : `${item.p.toLocaleString()}đ`;
                    return `
                        <div class="card">
                            ${item.h ? '<div class="badge">HOT</div>' : ''}
                            <div class="item-name">${item.n}</div>
                            <div class="item-price">${priceDisplay}</div>
                            <button class="add-btn" onclick="handleAddToCart('${item.n}', ${JSON.stringify(item.p)})">Thêm +</button>
                        </div>
                    `;
                }).join('');
            }
        }

        function handleAddToCart(name, prices) {
            if (Array.isArray(prices)) {
                document.getElementById('pickerModal').style.display = 'flex';
                document.getElementById('pickerTitle').innerText = name;
                document.getElementById('pickerOptions').innerHTML = prices.map(pr => `
                    <button class="price-option" onclick="addToCart('${name}', ${pr})">${pr.toLocaleString()}đ</button>
                `).join('');
            } else {
                addToCart(name, prices);
            }
        }

        function addToCart(name, price) {
            const id = `${name}-${price}`;
            const idx = cart.findIndex(i => i.id === id);
            if (idx > -1) cart[idx].qty++;
            else cart.push({ id, name, price, qty: 1 });
            
            closePicker();
            updateCartBar();
        }

        function updateCartBar() {
            const count = cart.reduce((a, b) => a + b.qty, 0);
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('cartBar').style.display = count > 0 ? 'flex' : 'none';
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartTotal').innerText = total.toLocaleString() + 'đ';
        }

        function openCheckout() {
            document.getElementById('checkoutModal').style.display = 'flex';
            let html = '', total = 0;
            cart.forEach(item => {
                const sum = item.price * item.qty;
                total += sum;
                html += `<div class="order-row"><span>${item.name} (${item.price/1000}k) x${item.qty}</span><span>${sum.toLocaleString()}đ</span></div>`;
            });
            html += `<hr style="margin:10px 0; opacity:0.1"><div class="order-row" style="font-weight:700"><span>Tiền hàng</span><span>${total.toLocaleString()}đ</span></div>`;
            document.getElementById('orderItems').innerHTML = html;
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const dist = calcDist(pos.coords.latitude, pos.coords.longitude, SHOP_POS.lat, SHOP_POS.lng);
                    const fee = dist <= 2 ? 0 : Math.ceil(dist - 2) * 8000;
                    shipData = { dist, fee, lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('shipCalc').innerHTML = `📏 Khoảng cách: ${dist.toFixed(1)}km | 🚚 Phí ship: ${fee == 0 ? 'FREE' : fee.toLocaleString()+'đ'}`;
                }, () => { document.getElementById('shipCalc').innerText = "Vui lòng cho phép định vị để tính phí ship."; });
            }
        }

        function sendToZalo() {
            let totalOrder = 0;
            let text = "🛍️ ĐƠN HÀNG MỚI:\n";
            cart.forEach(i => {
                text += `• ${i.name} (${i.price/1000}k) x${i.qty}\n`;
                totalOrder += (i.price * i.qty);
            });
            text += `\n💰 Tiền hàng: ${totalOrder.toLocaleString()}đ\n🚚 Phí ship: ${shipData.fee.toLocaleString()}đ\n🔥 TỔNG: ${(totalOrder + shipData.fee).toLocaleString()}đ\n📍 Vị trí: https://www.google.com/maps?q=${shipData.lat},${shipData.lng}`;
            window.open(`https://zalo.me/0985142598?text=${encodeURIComponent(text)}`, '_blank');
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function closePicker() { document.getElementById('pickerModal').style.display = 'none'; }
        function closeCheckout() { document.getElementById('checkoutModal').style.display = 'none'; }
        
        render();
    </script>
</body>
</html>
