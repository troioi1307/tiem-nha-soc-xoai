<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Nhà Sóc Xoài - Menu Đầy Đủ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; scroll-behavior: smooth; background-color: #fffaf0; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .product-card { transition: all 0.3s ease; border: 1px solid #fee2e2; }
        .product-card:hover { transform: translateY(-3px); border-color: #fb923c; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; }
        .category-pill.active { background-color: #f97316; color: white; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-800">

    <nav class="fixed top-0 w-full z-50 glass-nav shadow-sm px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white font-bold shadow-lg">SX</div>
            <h1 class="text-xl font-bold text-orange-600 tracking-tight">Sóc Xoài <span class="text-yellow-500 underline decoration-2">Shop</span></h1>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="toggleCart()" class="relative p-2.5 bg-orange-100 rounded-xl text-orange-600 transition hover:bg-orange-200">
                <i class="fas fa-shopping-basket text-lg"></i>
                <span id="cart-count" class="cart-badge">0</span>
            </button>
        </div>
    </nav>

    <section class="mt-20 px-6 py-10 text-center bg-white">
        <h2 class="text-3xl font-bold mb-2 text-gray-900">Thưởng thức vị ngon <br><span class="text-orange-500 text-4xl">Trọn từng khoảnh khắc</span></h2>
        <p class="text-gray-500 text-sm max-w-xs mx-auto mt-3 italic">"Menu đa dạng từ trà sữa, sữa chua đến soda thanh mát tại Tiệm Nhà Sóc Xoài"</p>
    </section>

    <section class="px-4 py-4 max-w-5xl mx-auto min-h-screen">
        <div id="category-list" class="flex gap-2 mb-8 overflow-x-auto pb-4 sticky top-[68px] z-40 bg-white/50 backdrop-blur-sm py-2">
            <button onclick="filterMenu('all')" class="category-pill active border border-orange-200 px-5 py-2 rounded-2xl whitespace-nowrap font-bold text-sm">Tất cả</button>
            <button onclick="filterMenu('Trà Sữa')" class="category-pill bg-white border border-orange-200 px-5 py-2 rounded-2xl whitespace-nowrap font-bold text-sm hover:bg-orange-50">Trà Sữa</button>
            <button onclick="filterMenu('Sữa Chua')" class="category-pill bg-white border border-orange-200 px-5 py-2 rounded-2xl whitespace-nowrap font-bold text-sm hover:bg-orange-50">Sữa Chua</button>
            <button onclick="filterMenu('Cacao-Matcha')" class="category-pill bg-white border border-orange-200 px-5 py-2 rounded-2xl whitespace-nowrap font-bold text-sm hover:bg-orange-50">Cacao & Matcha</button>
            <button onclick="filterMenu('Soda')" class="category-pill bg-white border border-orange-200 px-5 py-2 rounded-2xl whitespace-nowrap font-bold text-sm hover:bg-orange-50">Soda</button>
        </div>

        <div id="menu-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            </div>
    </section>

    <section id="order-section" class="bg-orange-50 px-6 py-16 mt-10">
        <div class="max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-xl">
            <h3 class="text-2xl font-extrabold mb-2 text-center text-gray-800">Xác Nhận Đơn Hàng</h3>
            <p class="text-center text-gray-500 text-sm mb-8">Vui lòng điền thông tin để tiệm ship ngay cho bạn nhé!</p>
            
            <form id="checkout-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1 ml-1">Họ tên của bạn</label>
                    <input type="text" id="name" required class="w-full bg-gray-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-orange-400 outline-none transition" placeholder="Ví dụ: Anh Sóc">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1 ml-1">Số điện thoại</label>
                    <input type="tel" id="phone" required class="w-full bg-gray-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-orange-400 outline-none transition" placeholder="090xxxxxxxx">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1 ml-1">Địa chỉ nhận hàng</label>
                    <textarea id="address" required class="w-full bg-gray-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-orange-400 outline-none transition" rows="3" placeholder="Ghi rõ số nhà, phường/xã..."></textarea>
                </div>

                <div class="p-5 bg-orange-600 rounded-2xl text-white shadow-lg shadow-orange-200">
                    <div class="flex justify-between items-center">
                        <span class="text-orange-100 font-medium">Tổng thanh toán:</span>
                        <span id="final-total" class="text-2xl font-black">0đ</span>
                    </div>
                </div>

                <button type="submit" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black text-lg shadow-lg hover:bg-green-600 transition transform active:scale-95 flex items-center justify-center gap-3">
                    <i class="fab fa-zalo text-2xl"></i> GỬI ĐƠN QUA ZALO NGAY
                </button>
            </form>
        </div>
    </section>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-[60] hidden backdrop-blur-sm transition-all">
        <div class="absolute right-0 top-0 w-full max-w-md bg-white h-full shadow-2xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-orange-50">
                <div>
                    <h3 class="font-black text-xl text-gray-800">Giỏ hàng</h3>
                    <p class="text-xs text-orange-500 font-bold">Tiệm Nhà Sóc Xoài</p>
                </div>
                <button onclick="toggleCart()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white text-gray-400 shadow-sm hover:text-red-500 transition">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-5">
                </div>

            <div class="p-6 border-t bg-gray-50">
                <div class="flex justify-between mb-4 font-bold text-lg">
                    <span>Tạm tính:</span>
                    <span id="cart-subtotal" class="text-orange-600">0đ</span>
                </div>
                <button onclick="toggleCart()" class="w-full bg-white border-2 border-orange-500 text-orange-500 py-3 rounded-2xl font-bold mb-3 hover:bg-orange-50">Thêm món khác</button>
                <a href="#order-section" onclick="toggleCart()" class="block text-center w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg">Đến phần thanh toán</a>
            </div>
        </div>
    </div>

    <script>
        const products = [
            // SODA
            { id: 1, name: 'Soda Việt Quất', price: 15000, category: 'Soda', color: 'bg-blue-400' },
            { id: 2, name: 'Soda Dâu', price: 15000, category: 'Soda', color: 'bg-red-400' },
            { id: 3, name: 'Soda Chanh Dây', price: 15000, category: 'Soda', color: 'bg-yellow-400' },
            { id: 4, name: 'Soda Dưa Lưới', price: 15000, category: 'Soda', color: 'bg-green-400' },
            
            // TRÀ SỮA
            { id: 5, name: 'Trà Sữa Gạo Rang', price: 25000, category: 'Trà Sữa', color: 'bg-orange-200' },
            { id: 6, name: 'Trà Sữa Truyền Thống Full Topping', price: 25000, category: 'Trà Sữa', color: 'bg-orange-300' },
            { id: 7, name: 'Trà Sữa Hạt Dẻ', price: 25000, category: 'Trà Sữa', color: 'bg-amber-600' },
            { id: 8, name: 'Trà Sữa Phô Mai', price: 25000, category: 'Trà Sữa', color: 'bg-yellow-200' },

            // CACAO & MATCHA
            { id: 9, name: 'Matcha Oreo', price: 25000, category: 'Cacao-Matcha', color: 'bg-green-600' },
            { id: 10, name: 'Cacao Bạc Hà', price: 20000, category: 'Cacao-Matcha', color: 'bg-teal-700' },
            { id: 11, name: 'Cacao Oreo', price: 25000, category: 'Cacao-Matcha', color: 'bg-brown-800' },
            { id: 12, name: 'Matcha Latte Kem', price: 25000, category: 'Cacao-Matcha', color: 'bg-green-300' },
            { id: 13, name: 'Cacao Latte', price: 20000, category: 'Cacao-Matcha', color: 'bg-orange-800' },
            { id: 14, name: 'Milo Dầm', price: 20000, category: 'Cacao-Matcha', color: 'bg-amber-900' },

            // SỮA CHUA
            { id: 15, name: 'Sữa Chua Việt Quất', price: 25000, category: 'Sữa Chua', color: 'bg-blue-500' },
            { id: 16, name: 'Sữa Chua Dâu', price: 25000, category: 'Sữa Chua', color: 'bg-pink-400' },
            { id: 17, name: 'Sữa Chua Chanh Dây', price: 25000, category: 'Sữa Chua', color: 'bg-yellow-500' },
            { id: 18, name: 'Sữa Chua Dưa Lưới', price: 25000, category: 'Sữa Chua', color: 'bg-green-200' },
            { id: 19, name: 'Sữa Chua Đào', price: 25000, category: 'Sữa Chua', color: 'bg-orange-400' },
        ];

        let cart = [];

        function renderMenu(filter = 'all') {
            const container = document.getElementById('menu-container');
            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
            
            container.innerHTML = filtered.map(p => `
                <div class="product-card bg-white p-4 rounded-3xl flex items-center gap-4 relative overflow-hidden">
                    <div class="w-20 h-20 ${p.color} rounded-2xl flex-shrink-0 flex items-center justify-center text-white shadow-inner">
                        <i class="fas fa-glass-whiskey text-2xl opacity-50"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-extrabold text-gray-800 leading-tight mb-1 text-sm sm:text-base">${p.name}</h4>
                        <p class="text-orange-600 font-black text-lg">${p.price.toLocaleString()}đ</p>
                        <button onclick="addToCart(${p.id})" class="mt-2 w-full sm:w-auto bg-orange-50 text-orange-600 px-4 py-1.5 rounded-xl text-xs font-bold hover:bg-orange-500 hover:text-white transition">
                            + Thêm món
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filterMenu(cat) {
            renderMenu(cat);
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.remove('active', 'bg-orange-500', 'text-white');
                btn.classList.add('bg-white', 'text-gray-800');
            });
            event.target.classList.add('active', 'bg-orange-500', 'text-white');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const exist = cart.find(item => item.id === id);
            if (exist) {
                exist.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCart();
            // Hiệu ứng thông báo nhỏ
            const btn = event.target;
            btn.innerText = "Đã thêm!";
            setTimeout(() => btn.innerText = "+ Thêm món", 800);
        }

        function updateCart() {
            const cartItems = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const cartSubtotal = document.getElementById('cart-subtotal');
            const finalTotal = document.getElementById('final-total');
            
            let total = 0;
            let count = 0;

            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="text-center py-20">
                        <i class="fas fa-shopping-cart text-5xl text-gray-100 mb-4"></i>
                        <p class="text-gray-400 font-medium">Chưa có món nào bạn ơi!</p>
                    </div>`;
            } else {
                cartItems.innerHTML = cart.map(item => {
                    total += item.price * item.quantity;
                    count += item.quantity;
                    return `
                        <div class="flex items-center gap-4 bg-orange-50/50 p-3 rounded-2xl border border-orange-100">
                            <div class="w-12 h-12 ${item.color} rounded-xl flex-shrink-0"></div>
                            <div class="flex-1">
                                <p class="font-bold text-sm text-gray-800">${item.name}</p>
                                <p class="text-xs font-bold text-orange-600">${item.price.toLocaleString()}đ</p>
                            </div>
                            <div class="flex items-center gap-3 bg-white px-2 py-1 rounded-lg shadow-sm">
                                <button onclick="changeQty(${item.id}, -1)" class="text-orange-500 p-1 hover:bg-orange-50 rounded"><i class="fas fa-minus text-[10px]"></i></button>
                                <span class="font-black text-sm w-4 text-center">${item.quantity}</span>
                                <button onclick="changeQty(${item.id}, 1)" class="text-orange-500 p-1 hover:bg-orange-50 rounded"><i class="fas fa-plus text-[10px]"></i></button>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            cartCount.innerText = count;
            cartSubtotal.innerText = total.toLocaleString() + 'đ';
            finalTotal.innerText = total.toLocaleString() + 'đ';
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.quantity += delta;
            if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
            updateCart();
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('hidden');
        }

        document.getElementById('checkout-form').onsubmit = (e) => {
            e.preventDefault();
            if (cart.length === 0) return alert('Giỏ hàng đang trống, hãy chọn món trước nhé!');
            
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const total = document.getElementById('final-total').innerText;

            let message = `🚀 ĐƠN HÀNG MỚI TỪ WEBSITE:\n`;
            message += `--------------------------\n`;
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name} x${item.quantity} = ${(item.price * item.quantity).toLocaleString()}đ\n`;
            });
            message += `--------------------------\n`;
            message += `💰 TỔNG CỘNG: ${total}\n`;
            message += `👤 KHÁCH HÀNG: ${name}\n`;
            message += `📞 SỐ ĐT: ${phone}\n`;
            message += `📍 ĐỊA CHỈ: ${address}\n`;
            message += `--------------------------\n`;
            message += `Tiệm chuẩn bị đơn cho khách nhé!`;

            const zaloPhone = "0901234567"; // THAY SỐ ĐIỆN THOẠI CỦA BẠN VÀO ĐÂY
            const zaloUrl = `https://zalo.me/${zaloPhone}?text=${encodeURIComponent(message)}`;
            window.open(zaloUrl, '_blank');
        };

        // Khởi tạo menu
        renderMenu();
    </script>
</body>
</html>
