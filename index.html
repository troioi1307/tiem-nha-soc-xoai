<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiệm Nhà Xoài Sóc - Universe Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Pattaya&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --mango-red: #FF4E50; --mango-orange: #FC913A; --mango-yellow: #F9D423;
            --forest-green: #2ecc71; --ocean-blue: #00d2ff; --dark-brown: #5d4037;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: #FFF9E3;
            color: var(--dark-brown);
            overflow-x: hidden;
            transition: background 0.8s ease; /* Hiệu ứng chuyển màu nền */
        }

        /* --- SÓC BIKINI TRUY ĐUỔI --- */
        #chibi-runner {
            position: fixed; width: 70px; height: 70px; font-size: 55px;
            pointer-events: none; z-index: 9999;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
        }

        /* --- HEADER SIÊU CẤP --- */
        header {
            height: 450px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(180deg, var(--ocean-blue), #fff); border-bottom-left-radius: 80px; border-bottom-right-radius: 80px;
            position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .hero-chibi { font-size: 130px; animation: heroBounce 4s infinite ease-in-out; cursor: pointer; z-index: 2; transition: 0.5s; }
        @keyframes heroBounce { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-40px) rotate(5deg); } }
        .brand-title { font-family: 'Pattaya', sans-serif; font-size: 3.2rem; color: var(--mango-red); text-shadow: 4px 4px 0 white; margin-top: 10px; z-index: 3; }

        /* --- STICKY NAV --- */
        nav {
            position: sticky; top: 15px; z-index: 1000; margin: 0 15px; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px); border-radius: 40px; padding: 12px; display: flex; gap: 10px; overflow-x: auto;
            border: 3px solid var(--mango-yellow); box-shadow: 0 15px 35px rgba(0,0,0,0.15); scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }
        .nav-link { padding: 12px 22px; background: white; border-radius: 30px; text-decoration: none; color: var(--dark-brown); font-weight: 800; white-space: nowrap; transition: 0.4s; }
        .nav-link.active { background: var(--mango-yellow); transform: scale(1.1) translateY(-2px); box-shadow: 0 10px 20px rgba(249, 212, 35, 0.4); }

        /* --- MENU CARDS --- */
        .container { padding: 30px 20px; max-width: 550px; margin: auto; }
        .section-header { margin: 50px 0 25px; font-family: 'Pattaya'; font-size: 2rem; color: var(--mango-orange); display: flex; align-items: center; gap: 15px; }
        
        .card-toy {
            background: rgba(255, 255, 255, 0.95); border-radius: 45px; padding: 25px; margin-bottom: 30px;
            display: flex; align-items: center; gap: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border: 4px solid white; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-toy:hover { transform: scale(1.03); border-color: var(--mango-yellow); }

        .icon-box {
            width: 85px; height: 85px; background: linear-gradient(135deg, var(--mango-yellow), var(--mango-orange));
            border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 48px;
            color: white; box-shadow: 0 12px 25px rgba(252, 145, 58, 0.3);
        }

        .btn-add-pro {
            background: var(--forest-green); color: white; border: none; padding: 12px 25px; border-radius: 25px;
            font-weight: 900; cursor: pointer; box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3); transition: 0.3s;
        }
        .btn-add-pro:active { transform: scale(0.9); }

        /* --- HUD ADVENTURE BAR --- */
        .adventure-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 450px; background: var(--dark-brown); padding: 18px 28px;
            border-radius: 50px; display: flex; align-items: center; justify-content: space-between;
            color: white; z-index: 2000; border: 4px solid var(--mango-yellow);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        /* --- WAVE FOOTER --- */
        footer {
            background: var(--dark-brown); padding: 80px 20px 160px; text-align: center; color: white;
            border-top: 15px solid var(--mango-yellow); border-radius: 60px 60px 0 0; position: relative;
        }
        .wave-svg { position: absolute; top: -45px; left: 0; width: 100%; height: 50px; fill: var(--dark-brown); animation: waveMove 4s linear infinite; }
        @keyframes waveMove { from { transform: translateX(0); } to { transform: translateX(-20px); } }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 25px; }
        .modal-content { background: white; border-radius: 50px; border: 8px solid var(--mango-yellow); padding: 40px 30px; width: 100%; max-width: 450px; text-align: center; }
    </style>
</head>
<body>

    <div id="chibi-runner">🐿️</div>

    <header>
        <div class="hero-chibi">🐿️🥭</div>
        <h1 class="brand-title">XOÀI SÓC UNIVERSE</h1>
        <p style="background: white; padding: 6px 20px; border-radius: 30px; color: var(--forest-green); font-weight: 900; margin-top: 15px;">
            Mùa Hè Sôi Động 🏖️✨
        </p>
        <div style="margin-top: 30px; background: white; padding: 12px; border-radius: 25px; border: 4px dashed var(--mango-orange);">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://m.me/luong.kute.568" width="100">
        </div>
    </header>

    <nav id="navbar">
        <a href="#tra-sua" class="nav-link active" data-bg="#FFF9E3">🧋 Trà Sữa</a>
        <a href="#sua-chua" class="nav-link" data-bg="#FDF2E9">🍦 Sữa Chua</a>
        <a href="#tra" class="nav-link" data-bg="#E0F7FA">🍑 Trà Đào</a>
        <a href="#latte" class="nav-link" data-bg="#FFF0F5">🥛 Latte</a>
        <a href="#soda" class="nav-link" data-bg="#F0FFF0">🍹 Soda</a>
    </nav>

    <div class="container" id="menu-root"></div>

    <footer>
        <h2 style="font-family: 'Pattaya'; margin-bottom: 30px; font-size: 2.2rem;">LIÊN HỆ SÓC 🛰️</h2>
        <div style="display: flex; justify-content: center; flex-wrap: wrap; gap: 15px;">
            <a href="tel:0985142598" style="background:white; width:60px; height:60px; border-radius:20px; display:flex; align-items:center; justify-content:center; color:var(--dark-brown); font-size:24px; text-decoration:none;"><i class="fa-solid fa-phone"></i></a>
            <a href="https://m.me/luong.kute.568" style="background:white; width:60px; height:60px; border-radius:20px; display:flex; align-items:center; justify-content:center; color:var(--dark-brown); font-size:24px; text-decoration:none;"><i class="fa-brands fa-facebook-messenger"></i></a>
            <a href="https://google.com/maps/place/Báng+Tráng+Xoài+Sóc/@20.0987887,106.2812127,15z/data=!4m6!3m5!1s0x313611002e13c06f:0x3398d382bbfdda07!8m2!3d20.0961835!4d106.2745724!16s%2Fg%2F11xyp5qt7f" style="background:white; width:60px; height:60px; border-radius:20px; display:flex; align-items:center; justify-content:center; color:var(--dark-brown); font-size:24px; text-decoration:none;"><i class="fa-solid fa-location-dot"></i></a>
        </div>
        <p style="margin-top: 40px; opacity: 0.5;">Hotline: 0985142598 | © 2026 TIỆM NHÀ XOÀI SÓC</p>
    </footer>

    <div class="adventure-bar" id="bag-bar" style="display:none;">
        <div style="font-weight: 900; font-size: 1.3rem;">
            <i class="fa-solid fa-gem" style="color:var(--mango-yellow)"></i> <span id="bag-total">0</span>k
        </div>
        <button onclick="openBag()" style="background:var(--mango-red); color:white; border:none; padding:15px 30px; border-radius:30px; font-weight:900; cursor:pointer; font-size:1.1rem;">ĐẶT NGAY ✨</button>
    </div>

    <div class="modal" id="bag-modal">
        <div class="modal-content animate__animated animate__bounceIn">
            <h2 style="font-family: 'Pattaya'; color: var(--mango-orange); font-size: 2rem;">GIỎ HÀNG THẦN KỲ 🎒</h2>
            <div id="bag-items" style="text-align: left; margin: 25px 0; max-height: 280px; overflow-y: auto; font-weight: 800; font-size: 1.1rem; border-top: 2px dashed #eee; padding-top: 15px;"></div>
            <div style="font-size: 2rem; font-weight: 900; margin-bottom: 25px;">Tổng: <span id="modal-total" style="color: var(--mango-red);">0</span>k</div>
            <button class="btn-add-pro" style="width: 100%; height: 65px; font-size: 1.3rem; background: var(--ocean-blue);" onclick="sendOrder()">GỬI ĐƠN & COPY ✨</button>
            <p onclick="closeBag()" style="margin-top: 20px; cursor: pointer; color: #f44336; font-weight: 900;">QUAY LẠI MAP</p>
        </div>
    </div>

    <script>
        const menuData = {
            "tra-sua": { title: "Vùng Đất Trà Sữa", items: [
                { n: "Trà sữa gạo rang", p: [20, 25], i: "🌾" },
                { n: "Trà sữa hạt dẻ cười", p: [20, 25], i: "🥜" },
                { n: "Trà sữa thái xanh", p: [20, 25], i: "🍵" },
                { n: "Trà sữa truyền thống", p: [20, 25], i: "🧋" },
                { n: "Trà sữa sầu riêng", p: [20, 25], i: "🍈" }
            ]},
            "sua-chua": { title: "Ốc Đảo Sữa Chua", items: [
                { n: "Sữa chua việt quất", p: 25, i: "🫐" }, { n: "Sữa chua dâu", p: 25, i: "🍓" },
                { n: "Sữa chua chanh dây", p: 25, i: "🍋" }, { n: "Sữa chua xoài", p: 25, i: "🥭" }
            ]},
            "tra": { title: "Suối Nguồn Trà Đào", items: [{ n: "Trà thạch đào", p: 20, i: "🍑" }]},
            "latte": { title: "Cánh Đồng Latte", items: [
                { n: "Choco chuối", p: 25, i: "🍌" }, { n: "Matcha latte", p: 20, i: "🍵" },
                { n: "Cacao bạc hà", p: 20, i: "🌿" }, { n: "Milo dầm", p: 20, i: "🥣" }
            ]},
            "soda": { title: "Thung Lũng Soda", items: [
                { n: "Soda việt quất", p: 15, i: "🫐" }, { n: "Soda dâu", p: 15, i: "🍓" }
            ]}
        };

        function render() {
            const root = document.getElementById('menu-root');
            for (let key in menuData) {
                let html = `<h2 id="${key}" class="section-header animate__animated animate__fadeInLeft">${menuData[key].title}</h2>`;
                menuData[key].items.forEach(item => {
                    let prices = Array.isArray(item.p) 
                        ? `<div style="display:flex;gap:10px;margin-top:10px">
                             <button onclick="add('${item.n} (N)', 20)" class="btn-add-pro" style="background:white;color:var(--dark-brown);border:2px solid var(--mango-yellow)">20k</button>
                             <button onclick="add('${item.n} (L)', 25)" class="btn-add-pro" style="background:white;color:var(--dark-brown);border:2px solid var(--mango-yellow)">25k</button>
                           </div>`
                        : `<div style="display:flex;justify-content:space-between;align-items:center;width:100%;margin-top:10px">
                             <span style="font-weight:900;color:var(--mango-red);font-size:1.3rem">${item.p}k</span>
                             <button onclick="add('${item.n}', ${item.p})" class="btn-add-pro">MUA ✨</button>
                           </div>`;
                    html += `<div class="card-toy animate__animated animate__fadeInUp">
                                <div class="icon-box">${item.i}</div>
                                <div style="flex:1"><p style="font-weight:800;font-size:1.1rem;text-transform:uppercase">${item.n}</p>${prices}</div>
                             </div>`;
                });
                root.innerHTML += html;
            }
        }

        let cart = [];
        function add(name, price) {
            if (navigator.vibrate) navigator.vibrate(50);
            const ex = cart.find(i => i.name === name);
            if (ex) ex.qty++; else cart.push({ name, price, qty: 1 });
            updateUI();
            confetti({ particleCount: 70, spread: 50, origin: { y: 0.9 }, colors: ['#F9D423', '#FC913A', '#FF4E50'] });
        }

        function updateUI() {
            let total = 0; cart.forEach(i => total += i.price * i.qty);
            document.getElementById('bag-total').innerText = total;
            document.getElementById('bag-bar').style.display = cart.length > 0 ? 'flex' : 'none';
        }

        function openBag() {
            const list = document.getElementById('bag-items');
            list.innerHTML = ""; let total = 0;
            cart.forEach(i => { total += i.price * i.qty; list.innerHTML += `<div style="padding:10px 0;border-bottom:1px dashed #eee">✨ ${i.name} x${i.qty} = ${i.price*i.qty}k</div>`; });
            document.getElementById('modal-total').innerText = total;
            document.getElementById('bag-modal').style.display = 'flex';
        }

        function closeBag() { document.getElementById('bag-modal').style.display = 'none'; }

        function sendOrder() {
            let text = "🐿️ CHIẾN TÍCH XOÀI SÓC 🐿️\n---\n";
            cart.forEach(i => text += `• ${i.name} x${i.qty}\n`);
            text += `---\n💰 TỔNG: ${document.getElementById('modal-total').innerText}k`;
            const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            alert("Đã sao chép đơn hàng thành công! ✨");
            window.location.href = "https://m.me/luong.kute.568";
        }

        // Sóc thám hiểm chạy theo ngón tay/chuột
        const runner = document.getElementById('chibi-runner');
        document.addEventListener('mousemove', (e) => {
            runner.style.left = e.clientX - 35 + 'px';
            runner.style.top = e.clientY - 35 + 'px';
        });
        document.addEventListener('touchmove', (e) => {
            runner.style.left = e.touches[0].clientX - 35 + 'px';
            runner.style.top = e.touches[0].clientY - 35 + 'px';
        });

        // Hiệu ứng chuyển màu nền khi cuộn
        window.addEventListener('scroll', () => {
            let cur = "";
            document.querySelectorAll('.section-header').forEach(s => {
                if (pageYOffset >= s.offsetTop - 250) cur = s.getAttribute('id');
            });
            
            const navLink = document.querySelector(`.nav-link[href="#${cur}"]`);
            if (navLink) {
                document.body.style.background = navLink.getAttribute('data-bg');
                document.querySelectorAll('.nav-link').forEach(i => i.classList.remove('active'));
                navLink.classList.add('active');
                navLink.parentElement.scrollTo({ left: navLink.offsetLeft - 30, behavior: 'smooth' });
            }
        });

        render();
    </script>
</body>
</html>
