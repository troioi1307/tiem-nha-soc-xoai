<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiệm Nhà Sóc Xoài - The Ultimate Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Pattaya&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --mango: #FFD200; --orange: #F7971E; --red: #FF4E50;
            --blue: #00d2ff; --green: #2ecc71; --brown: #5d4037;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: #FFF9E3; color: var(--brown);
            overflow-x: hidden; transition: background 1s ease;
        }

        /* --- SÓC VIP FOLLOW --- */
        #chibi-runner {
            position: fixed; width: 80px; height: 80px; font-size: 65px;
            pointer-events: none; z-index: 9999;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
        }

        /* --- HEADER SIÊU CẤP --- */
        header {
            height: 480px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(180deg, var(--blue), #fff); border-bottom-left-radius: 100px; border-bottom-right-radius: 100px;
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center;
        }
        .hero-chibi { font-size: 130px; animation: heroBounce 4s infinite ease-in-out; }
        @keyframes heroBounce { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-30px) rotate(5deg); } }
        .brand { font-family: 'Pattaya', sans-serif; font-size: 3.5rem; color: var(--red); text-shadow: 4px 4px 0 white; margin-bottom: 5px; }

        /* --- SLOGAN VIP (badge trắng) --- */
        .slogan-badge {
            background: white; padding: 10px 30px; border-radius: 50px;
            box-shadow: 0 10px 25px rgba(247, 151, 30, 0.2);
            display: inline-flex; align-items: center; gap: 10px;
            animation: pulse 2s infinite; border: 2px solid var(--mango);
        }
        .slogan-text { color: #ff9f43; font-weight: 900; font-size: 1rem; text-transform: uppercase; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* --- NAVBAR GLASS --- */
        nav {
            position: sticky; top: 15px; z-index: 1000; margin: 0 15px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            border-radius: 40px; padding: 10px; display: flex; gap: 8px; overflow-x: auto;
            border: 3px solid var(--mango); box-shadow: 0 15px 35px rgba(0,0,0,0.1); scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }
        .nav-link { padding: 12px 25px; background: white; border-radius: 30px; text-decoration: none; color: var(--brown); font-weight: 800; white-space: nowrap; transition: 0.3s; }
        .nav-link.active { background: var(--mango); transform: scale(1.1); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }

        /* --- CARD PREMIUM --- */
        .container { padding: 30px 20px; max-width: 550px; margin: auto; }
        .section-header { margin: 50px 0 25px; font-family: 'Pattaya'; font-size: 2rem; color: var(--orange); }
        
        .premium-card {
            background: white; border-radius: 50px; padding: 25px; margin-bottom: 30px;
            display: flex; align-items: center; gap: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 4px solid white; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .premium-card:hover { transform: translateY(-8px); border-color: var(--mango); }
        
        /* Hiệu ứng tia sáng lấp lánh cho món hot */
        .hot-aura::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-25deg); animation: shine 3s infinite;
        }
        @keyframes shine { from { left: -100%; } to { left: 200%; } }

        .item-icon-box {
            width: 85px; height: 85px; background: linear-gradient(135deg, var(--mango), var(--orange));
            border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 48px;
            color: white; box-shadow: 0 10px 20px rgba(247, 151, 30, 0.2);
        }

        .btn-add-pro {
            background: var(--green); color: white; border: none; padding: 12px 25px; border-radius: 25px;
            font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #27ae60; transition: 0.1s;
        }
        .btn-add-pro:active { transform: translateY(4px); box-shadow: none; }

        /* --- HUD --- */
        .adventure-hud {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 420px; background: var(--brown); padding: 18px 25px;
            border-radius: 50px; display: flex; align-items: center; justify-content: space-between;
            color: white; z-index: 2000; border: 4px solid var(--mango);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        footer { background: var(--brown); color: white; padding: 100px 20px 150px; text-align: center; border-radius: 80px 80px 0 0; }
        .social-btn { background: white; width: 60px; height: 60px; border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; color: var(--brown); font-size: 26px; text-decoration: none; margin: 10px; transition: 0.3s; }
        .social-btn:hover { transform: scale(1.1) rotate(10deg); color: var(--orange); }
    </style>
</head>
<body>

    <div id="chibi-runner">🐿️</div>

    <header>
        <div class="hero-chibi animate__animated animate__zoomIn">🐿️🥭</div>
        <h1 class="brand">TIỆM NHÀ SÓC XOÀI</h1>
        <div class="slogan-badge">
            <span class="slogan-text">Ngọt vị xoài, dễ thương cùng Sóc</span>
            <span>🚀</span>
        </div>
        <div style="margin-top: 30px; background: white; padding: 12px; border-radius: 25px; border: 4px dashed var(--orange);">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://m.me/luong.kute.568" width="100">
        </div>
    </header>

    <nav id="navbar">
        <a href="#tra-sua" class="nav-link active" data-bg="#FFF9E3">🧋 Trà Sữa</a>
        <a href="#sua-chua" class="nav-link" data-bg="#FDF2E9">🍦 Sữa Chua</a>
        <a href="#tra-dao" class="nav-link" data-bg="#E0F7FA">🍑 Trà Đào</a>
        <a href="#latte" class="nav-link" data-bg="#FFF0F5">🥛 Latte</a>
        <a href="#soda" class="nav-link" data-bg="#F0FFF0">🍹 Soda</a>
    </nav>

    <div class="container" id="menu-target"></div>

    <footer>
        <h2 style="font-family: 'Pattaya'; margin-bottom: 25px; font-size: 2.2rem;">LIÊN HỆ VỚI SÓC 🛰️</h2>
        <div style="display: flex; justify-content: center; gap: 10px;">
            <a href="tel:0985142598" class="social-btn"><i class="fa-solid fa-phone"></i></a>
            <a href="https://m.me/luong.kute.568" class="social-btn"><i class="fa-brands fa-facebook-messenger"></i></a>
            <a href="https://google.com/maps/place/Báng+Tráng+Xoài+Sóc/@20.0987887,106.2812127,15z/data=!4m6!3m5!1s0x313611002e13c06f:0x3398d382bbfdda07!8m2!3d20.0961835!4d106.2745724!16s%2Fg%2F11xyp5qt7f" class="social-btn"><i class="fa-solid fa-location-dot"></i></a>
        </div>
        <p style="margin-top: 40px; opacity: 0.6;">© 2026 TIỆM NHÀ SÓC XOÀI - VIP PRO MAX EDITION</p>
    </footer>

    <div class="adventure-hud" id="hud-bar" style="display:none;">
        <div style="font-weight: 900; font-size: 1.3rem;">
            <i class="fa-solid fa-gem" style="color:var(--mango)"></i> <span id="total-val">0</span>k
        </div>
        <button onclick="openFinalBag()" style="background:var(--red); color:white; border:none; padding:15px 30px; border-radius:30px; font-weight:900; cursor:pointer; font-size:1.1rem;">ĐẶT NGAY ✨</button>
    </div>

    <div id="final-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:3000; display:none; align-items:center; justify-content:center; padding:25px;">
        <div style="background:white; border-radius:60px; border:10px solid var(--mango); padding:45px 35px; width:100%; max-width:480px; text-align:center;">
            <h2 style="font-family:'Pattaya'; color:var(--orange); font-size:2.2rem; margin-bottom: 20px;">HÀNH TRANG 🎒</h2>
            <div id="bag-list" style="text-align:left; margin:20px 0; max-height:280px; overflow-y:auto; font-weight:800; font-size:1.1rem; border-top: 2px dashed #eee; padding-top: 20px;"></div>
            <div style="font-size:2.5rem; font-weight: 900; margin-bottom: 30px;">TỔNG: <span id="modal-val" style="color:var(--red);">0</span>k</div>
            <button style="width:100%; height:75px; background:#0084FF; color:white; border:none; border-radius:25px; font-weight:900; font-size:1.4rem; box-shadow: 0 10px 20px rgba(0, 132, 255, 0.3);" onclick="sendToSóc()">GỬI MESSENGER 🚀</button>
            <p onclick="closeFinalBag()" style="margin-top:25px; cursor:pointer; color:#f44336; font-weight:900;">TIẾP TỤC CHỌN MÓN</p>
        </div>
    </div>

    <script>
        const menu = {
            "tra-sua": { title: "DÒNG TRÀ SỮA 🧋", items: [
                { n: "Trà sữa gạo rang", p: [20, 25], i: "🌾", hot: true },
                { n: "Trà sữa hạt dẻ cười", p: [20, 25], i: "🥜" },
                { n: "Trà sữa thái xanh", p: [20, 25], i: "🍵" },
                { n: "Trà sữa truyền thống full topping", p: [20, 25], i: "🧋", hot: true },
                { n: "Trà sữa sầu riêng", p: [20, 25], i: "🍈" }
            ]},
            "sua-chua": { title: "DÒNG SỮA CHUA 🍦", items: [
                { n: "Sữa chua việt quất", p: 25, i: "🫐" }, { n: "Sữa chua dâu", p: 25, i: "🍓" },
                { n: "Sữa chua chanh dây", p: 25, i: "🍋" }, { n: "Sữa chua xoài", p: 25, i: "🥭", hot: true },
                { n: "Sữa chua dưa lưới", p: 25, i: "🍈" }, { n: "Sữa chua đào", p: 25, i: "🍑" }
            ]},
            "tra-dao": { title: "TRÀ TRÁI CÂY 🍑", items: [{ n: "Trà thạch đào", p: 20, i: "🍑", hot: true }]},
            "latte": { title: "DÒNG LATTE & SỮA 🥛", items: [
                { n: "Choco sữa chuối", p: 25, i: "🍌" }, { n: "Matcha latte", p: 20, i: "🍵" },
                { n: "Matcha kem muối", p: 25, i: "🧂", hot: true }, { n: "Cacao latte", p: 20, i: "🍫" },
                { n: "Milo dầm", p: 20, i: "🥣" }
            ]},
            "soda": { title: "SODA FRESH 🍹", items: [
                { n: "Soda việt quất", p: 15, i: "🫐" }, { n: "Soda chanh dây", p: 15, i: "🍋" },
                { n: "Soda dâu", p: 15, i: "🍓" }, { n: "Soda dưa lưới", p: 15, i: "🍈" }
            ]}
        };

        function render() {
            const root = document.getElementById('menu-target');
            for (let cat in menu) {
                let html = `<h2 id="${cat}" class="section-header animate__animated animate__fadeInLeft">${menu[cat].title}</h2>`;
                menu[cat].items.forEach(item => {
                    let aura = item.hot ? 'hot-aura' : '';
                    let pricePart = Array.isArray(item.p) 
                        ? `<div style="display:flex;gap:12px;margin-top:10px">
                             <button onclick="add('${item.n} (N)', 20)" class="btn-add-pro" style="background:#fff;color:var(--brown);border:2px solid var(--mango);box-shadow:none">20k</button>
                             <button onclick="add('${item.n} (L)', 25)" class="btn-add-pro" style="background:#fff;color:var(--brown);border:2px solid var(--mango);box-shadow:none">25k</button>
                           </div>`
                        : `<div style="display:flex;justify-content:space-between;align-items:center;width:100%;margin-top:10px">
                             <span style="font-weight:900;color:var(--red);font-size:1.4rem">${item.p}k</span>
                             <button onclick="add('${item.n}', ${item.p})" class="btn-add-pro">MUA ✨</button>
                           </div>`;
                    html += `<div class="premium-card ${aura} animate__animated animate__fadeInUp">
                                <div class="item-icon-box">${item.i}</div>
                                <div style="flex:1"><p style="font-weight:800;font-size:1.15rem">${item.n.toUpperCase()}</p>${pricePart}</div>
                             </div>`;
                });
                root.innerHTML += html;
            }
        }

        let cart = [];
        function add(n, p) {
            const ex = cart.find(i => i.n === n);
            if (ex) ex.q++; else cart.push({ n, p, q: 1 });
            if (navigator.vibrate) navigator.vibrate(50);
            confetti({ particleCount: 80, spread: 70, origin: { y: 0.8 }, colors: ['#FFD200', '#F7971E', '#FF4E50'] });
            updateHUD();
        }

        function updateHUD() {
            let total = 0; cart.forEach(i => total += i.p * i.q);
            document.getElementById('total-val').innerText = total;
            document.getElementById('hud-bar').style.display = cart.length > 0 ? 'flex' : 'none';
        }

        function openFinalBag() {
            const list = document.getElementById('bag-list'); list.innerHTML = ""; let total = 0;
            cart.forEach(i => { total += i.p * i.q; list.innerHTML += `<div style="padding:12px 0;border-bottom:1px dashed #eee">💎 ${i.n} x${i.q} = ${i.p*i.q}k</div>`; });
            document.getElementById('modal-val').innerText = total;
            document.getElementById('final-modal').style.display = 'flex';
        }

        function closeFinalBag() { document.getElementById('final-modal').style.display = 'none'; }

        function sendToSóc() {
            let text = "🐿️ NHẬT KÝ ĐẶT MÓN TỪ TIỆM NHÀ SÓC XOÀI 🐿️\n---\n";
            cart.forEach(i => text += `⚔️ ${i.n} (x${i.q})\n`);
            text += `---\n💰 TỔNG NĂNG LƯỢNG: ${document.getElementById('modal-total').innerText}k\n🚀 Sóc ơi ship cho mình nhé!`;
            const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            alert("Đã sao chép đơn hàng thành công! ✨");
            window.location.href = "https://m.me/luong.kute.568";
        }

        // Runner follow
        const runner = document.getElementById('chibi-runner');
        document.addEventListener('mousemove', (e) => { runner.style.left = e.clientX - 40 + 'px'; runner.style.top = e.clientY - 40 + 'px'; });
        document.addEventListener('touchmove', (e) => { runner.style.left = e.touches[0].clientX - 40 + 'px'; runner.style.top = e.touches[0].clientY - 40 + 'px'; });

        // Scroll Logic
        window.addEventListener('scroll', () => {
            let cur = "";
            document.querySelectorAll('.section-header').forEach(s => { if (pageYOffset >= s.offsetTop - 250) cur = s.getAttribute('id'); });
            const navLink = document.querySelector(`.nav-link[href="#${cur}"]`);
            if (navLink) {
                document.body.style.background = navLink.getAttribute('data-bg');
                document.querySelectorAll('.nav-link').forEach(i => i.classList.remove('active'));
                navLink.classList.add('active');
                navLink.parentElement.scrollTo({ left: navLink.offsetLeft - 30, behavior: 'smooth' });
            }
        });

        render();
    </script>
</body>
</html>
