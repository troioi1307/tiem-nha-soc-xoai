<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Nhà Sóc Xoài - Menu Đầy Đủ 100%</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #FFF9F0; color: #4A2C2A; scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Màu sắc rực rỡ cho từng thành phần */
        .card-banhmi { border-left: 10px solid #FF922B; background: #FFF4E6; }
        .card-anvat { border-left: 10px solid #FF6B6B; background: #FFF5F5; }
        .card-trasua { border-left: 10px solid #845EF7; background: #F8F0FC; }
        .card-soda { border-left: 10px solid #22B8CF; background: #E3FAFC; }
        .card-suachua { border-left: 10px solid #51CF66; background: #EBFBEE; }

        .product-card {
            border-radius: 24px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 12px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .category-pill {
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 800;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-add {
            background: #4A2C2A;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="pb-10">

    <header class="fixed top-0 w-full z-50 bg-orange-500 text-white p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-2">
            <span class="text-3xl">🐿️</span>
            <h1 class="font-black text-xl tracking-tight">TIỆM NHÀ SÓC XOÀI</h1>
        </div>
        <button onclick="toggleCart()" class="relative p-2 bg-orange-600 rounded-full">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-orange-600 text-[10px] font-black px-1.5 rounded-full">0</span>
        </button>
    </header>

    <div class="mt-20 flex gap-3 overflow-x-auto p-4 no-scrollbar bg-white shadow-sm sticky top-[68px] z-40">
        <button onclick="go('banhmi')" class="category-pill bg-orange-100 text-orange-700">🥖 Bánh Mì/Mỳ</button>
        <button onclick="go('anvat')" class="category-pill bg-red-100 text-red-700">🍡 Ăn Vặt</button>
        <button onclick="go('trasua')" class="category-pill bg-purple-100 text-purple-700">🧋 Trà Sữa</button>
        <button onclick="go('soda')" class="category-pill bg-cyan-100 text-cyan-700">🍹 Soda/Nước</button>
        <button onclick="go('suachua')" class="category-pill bg-green-100 text-green-700">🍦 Sữa Chua</button>
    </div>

    <main class="p-4 space-y-10">
        
        <section id="banhmi">
            <h2 class="text-xl font-black text-orange-600 mb-4 border-b-4 border-orange-200 inline-block">🥖 BÁNH MÌ & MỲ CAY</h2>
            <div id="box-banhmi"></div>
        </section>

        <section id="anvat">
            <h2 class="text-xl font-black text-red-600 mb-4 border-b-4 border-red-200 inline-block">🍡 ĂN VẶT & VIÊN CHIÊN</h2>
            <div id="box-anvat"></div>
        </section>

        <section id="trasua">
            <h2 class="text-xl font-black text-purple-600 mb-4 border-b-4 border-purple-200 inline-block">🧋 TRÀ SỮA & CACAO MATCHA</h2>
            <div id="box-trasua"></div>
        </section>

        <section id="soda">
            <h2 class="text-xl font-black text-cyan-600 mb-4 border-b-4 border-cyan-200 inline-block">🍹 SODA & GIẢI KHÁT</h2>
            <div id="box-soda"></div>
        </section>

        <section id="suachua">
            <h2 class="text-xl font-black text-green-600 mb-4 border-b-4 border-green-200 inline-block">🍦 SỮA CHUA TRÁI CÂY</h2>
            <div id="box-suachua"></div>
        </section>

    </main>

    <div class="m-4 p-6 bg-white rounded-[32px] shadow-2xl border-2 border-orange-100">
        <h3 class="text-center font-black text-2xl text-gray-800 mb-6 uppercase">🚀 Gửi Đơn Hàng</h3>
        <div class="space-y-4">
            <input type="text" id="name" placeholder="Tên của bạn" class="w-full p-4 bg-orange-50 rounded-2xl outline-none">
            <input type="tel" id="phone" placeholder="Số điện thoại" class="w-full p-4 bg-orange-50 rounded-2xl outline-none">
            <textarea id="address" placeholder="Địa chỉ giao hàng" class="w-full p-4 bg-orange-50 rounded-2xl outline-none"></textarea>
            
            <div class="flex justify-between items-center bg-gray-900 text-white p-6 rounded-2xl shadow-lg">
                <span class="font-bold opacity-70 italic">Tổng thanh toán:</span>
                <span id="final-total" class="text-2xl font-black text-orange-400">0đ</span>
            </div>

            <button onclick="send()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-3 shadow-lg">
                <i class="fab fa-facebook-messenger text-2xl"></i> GỬI QUA MESSENGER
            </button>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 z-[60] hidden flex items-end">
        <div class="w-full bg-white rounded-t-[40px] p-6 max-h-[70vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-xl">Món bạn đã chọn 🛒</h3>
                <button onclick="toggleCart()" class="text-4xl">&times;</button>
            </div>
            <div id="cart-content" class="space-y-4 pb-10"></div>
        </div>
    </div>

    <script>
        const products = [
            // BÁNH MÌ & MỲ (Theo yêu cầu)
            { n: 'Bánh mì trứng', p: 15000, c: 'banhmi', i: '🍳', s: 'card-banhmi' },
            { n: 'Bánh mì xúc xích', p: 15000, c: 'banhmi', i: '🌭', s: 'card-banhmi' },
            { n: 'Bánh mì chả cá', p: 15000, c: 'banhmi', i: '🥖', s: 'card-banhmi' },
            { n: 'Bánh mì nướng muối ớt', p: 15000, c: 'banhmi', i: '🌶️', s: 'card-banhmi' },
            { n: 'Mỳ cay đặc biệt', p: 25000, c: 'banhmi', i: '🍜', s: 'card-banhmi' },
            // ĂN VẶT & VIÊN CHIÊN (Theo yêu cầu)
            { n: 'Bánh tráng trộn', p: 15000, c: 'anvat', i: '🌯', s: 'card-anvat' },
            { n: 'Bánh tráng cuộn', p: 20000, c: 'anvat', i: '🌯', s: 'card-anvat' },
            { n: 'Bò viên (Phần)', p: 20000, c: 'anvat', i: '🧆', s: 'card-anvat' },
            { n: 'Tôm viên (Phần)', p: 20000, c: 'anvat', i: '🍢', s: 'card-anvat' },
            { n: 'Cá viên (Phần)', p: 20000, c: 'anvat', i: '🍡', s: 'card-anvat' },
            { n: 'Lạp xưởng nướng', p: 10000, c: 'anvat', i: '🌭', s: 'card-anvat' },
            { n: 'Xúc xích Đức', p: 10000, c: 'anvat', i: '🌭', s: 'card-anvat' },
            // TRÀ SỮA (Theo yêu cầu)
            { n: 'Trà sữa gạo rang', p: 25000, c: 'trasua', i: '🌾', s: 'card-trasua' },
            { n: 'Trà sữa truyền thống full topping', p: 25000, c: 'trasua', i: '🧋', s: 'card-trasua' },
            { n: 'Trà sữa hạt dẻ', p: 25000, c: 'trasua', i: '🌰', s: 'card-trasua' },
            { n: 'Trà sữa phô mai', p: 25000, c: 'trasua', i: '🧀', s: 'card-trasua' },
            { n: 'Matcha oreo', p: 25000, c: 'trasua', i: '🍵', s: 'card-trasua' },
            { n: 'Matcha latte kem', p: 25000, c: 'trasua', i: '🍦', s: 'card-trasua' },
            { n: 'Milo dầm cacao', p: 20000, c: 'trasua', i: '🍫', s: 'card-trasua' },
            { n: 'Cacao bạc hà', p: 20000, c: 'trasua', i: '🌿', s: 'card-trasua' },
            { n: 'Cacao oreo', p: 25000, c: 'trasua', i: '🍪', s: 'card-trasua' },
            { n: 'Cacao latte', p: 20000, c: 'trasua', i: '🥛', s: 'card-trasua' },
            // SODA & GIẢI KHÁT (Theo yêu cầu)
            { n: 'Trà tắc', p: 10000, c: 'soda', i: '🍹', s: 'card-soda' },
            { n: 'Nước cam', p: 15000, c: 'soda', i: '🍊', s: 'card-soda' },
            { n: 'Soda việt quất', p: 15000, c: 'soda', i: '🫐', s: 'card-soda' },
            { n: 'Soda dâu', p: 15000, c: 'soda', i: '🍓', s: 'card-soda' },
            { n: 'Soda chanh dây', p: 15000, c: 'soda', i: '🍋', s: 'card-soda' },
            { n: 'Soda dưa lưới', p: 15000, c: 'soda', i: '🍈', s: 'card-soda' },
            // SỮA CHUA (Theo yêu cầu)
            { n: 'Sữa chua việt quất', p: 25000, c: 'suachua', i: '🫐', s: 'card-suachua' },
            { n: 'Sữa chua dâu', p: 25000, c: 'suachua', i: '🍓', s: 'card-suachua' },
            { n: 'Sữa chua chanh dây', p: 25000, c: 'suachua', i: '🍋', s: 'card-suachua' },
            { n: 'Sữa chua dưa lưới', p: 25000, c: 'suachua', i: '🍈', s: 'card-suachua' },
            { n: 'Sữa chua đào', p: 25000, c: 'suachua', i: '🍑', s: 'card-suachua' }
        ];

        let cart = [];

        function render() {
            ['banhmi', 'anvat', 'trasua', 'soda', 'suachua'].forEach(cat => {
                document.getElementById('box-'+cat).innerHTML = products.filter(p => p.c === cat).map(p => `
                    <div class="product-card ${p.s}">
                        <div class="text-3xl">${p.i}</div>
                        <div class="flex-1">
                            <div class="font-bold text-sm">${p.n}</div>
                            <div class="text-orange-600 font-black">${p.p.toLocaleString()}đ</div>
                        </div>
                        <button onclick="add('${p.n}')" class="btn-add"><i class="fas fa-plus"></i></button>
                    </div>
                `).join('');
            });
        }

        function add(n) {
            const item = products.find(p => p.n === n);
            const ex = cart.find(p => p.n === n);
            if (ex) ex.q++; else cart.push({ ...item, q: 1 });
            up();
        }

        function up() {
            const content = document.getElementById('cart-content');
            let t = 0, c = 0;
            content.innerHTML = cart.map((it, idx) => {
                t += it.p * it.q; c += it.q;
                return `<div class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl border">
                    <div class="text-2xl">${it.i}</div>
                    <div class="flex-1 font-bold text-sm">${it.n}</div>
                    <div class="flex items-center gap-3">
                        <button onclick="qty(${idx},-1)" class="w-8 h-8 bg-white border rounded-full font-bold">-</button>
                        <span class="font-black">${it.q}</span>
                        <button onclick="qty(${idx},1)" class="w-8 h-8 bg-white border rounded-full font-bold">+</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('cart-count').innerText = c;
            document.getElementById('final-total').innerText = t.toLocaleString() + 'đ';
        }

        function qty(idx, d) {
            cart[idx].q += d;
            if (cart[idx].q <= 0) cart.splice(idx, 1);
            up();
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }
        function go(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'center' }); }

        function send() {
            if (cart.length === 0) return alert('Hãy chọn món vào giỏ nhé!');
            const name = document.getElementById('name').value || 'Khách';
            const phone = document.getElementById('phone').value || 'N/A';
            const addr = document.getElementById('address').value || 'N/A';
            const total = document.getElementById('final-total').innerText;

            let menu = "";
            cart.forEach((it, i) => menu += `${i+1}. ${it.i} ${it.n} x${it.q}\n`);

            const msg = `🐿️ ĐƠN HÀNG SÓC XOÀI 🐿️\n---\n🛍️ MÓN ĐẶT:\n${menu}---\n💰 TỔNG: ${total}\n👤 KHÁCH: ${name}\n📞 SĐT: ${phone}\n📍 ĐỊA CHỈ: ${addr}\n\nShop ơi làm món cho mình nhé! 🥰`;

            const el = document.createElement('textarea');
            el.value = msg; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);

            alert('Đã sao chép đơn! Hãy DÁN vào Messenger để gửi nhé ❤️');
            window.open('https://m.me/luong.kute.568', '_blank');
        }

        render();
    </script>
</body>
</html>
